<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dona Neide Marmitaria</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    margin:0;
}

header{
    background:#ff6600;
    color:white;
    padding:15px;
    text-align:center;
    font-size:20px;
}

.container{
    padding:20px;
}

input, select, button{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    background:#28a745;
    color:white;
    border:none;
    font-weight:bold;
}

button:hover{
    opacity:0.9;
    cursor:pointer;
}

.total{
    font-size:18px;
    font-weight:bold;
    margin-top:10px;
}

.painel{
    background:#ffffff;
    margin:20px;
    padding:15px;
    border-radius:8px;
}
</style>
</head>

<body>

<div style="text-align:center; margin-top:20px;">
    <img src="logo.png" width="180" style="border-radius:15px;">
</div>

<header>Dona Neide Marmitaria 🍛</header>

<div class="container" id="pedido">

<input type="text" id="nome" placeholder="Nome">
<input type="text" id="endereco" placeholder="Endereço">

<select id="tamanho" onchange="calcular()">
<option value="">Tamanho</option>
<option value="13.5">P - 13,50</option>
<option value="16.5">M - 16,50</option>
<option value="19.5">G - 19,50</option>
</select>

<select id="bebida" onchange="calcular()">
<option value="0">Sem bebida</option>
<option value="5">Refri lata +5</option>
<option value="8">Refri 2L +8</option>
</select>

<select id="localidade" onchange="calcular()">
<option value="">Entrega</option>
<option value="0">Zona Leste</option>
<option value="7">Outra localidade +7</option>
</select>

<select id="pagamento">
<option>Pagamento</option>
<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão</option>
</select>

<div class="total" id="total">Total: R$ 0,00</div>

<button onclick="finalizar()">Fazer Pedido</button>
<button onclick="abrirPainel()">Painel Administrativo</button>

</div>

<div class="container painel" id="painel" style="display:none;">

<h3>📊 Painel Administrativo</h3>

<p><strong>Total vendido hoje:</strong> R$ <span id="totalDia">0</span></p>
<p><strong>Pedidos hoje:</strong> <span id="qtdPedidos">0</span></p>

<div id="listaPedidos"></div>

<button onclick="fecharPainel()">Voltar</button>

</div>

<script>

let senhaAdmin = "1972";

function calcular(){

let t = parseFloat(document.getElementById("tamanho").value) || 0;
let b = parseFloat(document.getElementById("bebida").value) || 0;
let l = parseFloat(document.getElementById("localidade").value) || 0;

let total = t + b + l;

document.getElementById("total").innerText =
"Total: R$ " + total.toFixed(2);

}

function finalizar(){

let agora = new Date();
let data = agora.toLocaleDateString("pt-BR");
let hora = agora.toLocaleTimeString("pt-BR", { hour: '2-digit', minute: '2-digit' });

let nome = document.getElementById("nome").value;
let endereco = document.getElementById("endereco").value;
let pagamento = document.getElementById("pagamento").value;

let totalTexto = document.getElementById("total").innerText;
let total = parseFloat(totalTexto.replace("Total: R$ ", "")) || 0;

if(nome.trim() === "" || endereco.trim() === ""){
alert("Preencha nome e endereço!");
return;
}

if(total === 0){
alert("Selecione os itens do pedido!");
return;
}

let tamanhoTexto = document.getElementById("tamanho").options[document.getElementById("tamanho").selectedIndex].text;
let bebidaTexto = document.getElementById("bebida").options[document.getElementById("bebida").selectedIndex].text;
let localTexto = document.getElementById("localidade").options[document.getElementById("localidade").selectedIndex].text;

let numeroPedido = localStorage.getItem("numeroPedido") || 0;
numeroPedido++;
localStorage.setItem("numeroPedido", numeroPedido);

let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];
pedidos.push({numero: numeroPedido, nome: nome, total: total, data: data, hora: hora});
localStorage.setItem("pedidos", JSON.stringify(pedidos));

let mensagem =
"🍛 NOVO PEDIDO - Dona Neide\n\n" +
"🧾 Pedido Nº: " + numeroPedido + "\n" +
"🕒 Data: " + data + "\n" +
"⏰ Hora: " + hora + "\n\n" +
"👤 Nome: " + nome + "\n" +
"📍 Endereço: " + endereco + "\n" +
"📦 Localidade: " + localTexto + "\n\n" +
"🛒 Itens:\n" +
"- " + tamanhoTexto + "\n" +
"- " + bebidaTexto + "\n\n" +
"💳 Pagamento: " + pagamento + "\n" +
"💰 Total: R$ " + total.toFixed(2) + "\n\n" +
"🙏 Obrigado pela preferência!";

let telefone = "5569992509281"; // TROQUE AQUI

window.open("https://wa.me/" + telefone + "?text=" + encodeURIComponent(mensagem));

}

function abrirPainel(){
let senha = prompt("Digite a senha:");
if(senha === senhaAdmin){

document.getElementById("painel").style.display = "block";

let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];
let totalDia = 0;

let html = "";

pedidos.forEach(p => {
totalDia += parseFloat(p.total);
html += `
<div style="border:1px solid #ccc; padding:10px; margin-bottom:10px;">
<strong>Pedido Nº ${p.numero}</strong><br>
Nome: ${p.nome}<br>
Total: R$ ${p.total}<br>
Data: ${p.data} ${p.hora}
</div>
`;
});

document.getElementById("totalDia").innerText = totalDia.toFixed(2);
document.getElementById("qtdPedidos").innerText = pedidos.length;
document.getElementById("listaPedidos").innerHTML = html;

}else{
alert("Senha incorreta!");
}
}

function fecharPainel(){
document.getElementById("painel").style.display = "none";
}

</script>

</body>
</html>
