<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dona Neide - Pedido Online</title>

<style>
body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#ff9f43,#ff6b6b);
padding:20px;
}

.container{
background:#fff;
padding:20px;
border-radius:20px;
max-width:420px;
margin:auto;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.logo{
text-align:center;
margin-bottom:10px;
}

.logo img{
width:120px;
border-radius:15px;
}

h2{
text-align:center;
color:#333;
}

select,input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:14px;
}

button{
background:#28a745;
color:#fff;
font-weight:bold;
border:none;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#218838;
}

.total{
font-size:18px;
font-weight:bold;
margin-top:10px;
text-align:center;
color:#000;
}

.pix-box{
background:#f1f1f1;
padding:10px;
border-radius:10px;
margin-top:10px;
font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<div style="text-align:center;margin-top:15px;">
<img src="https://i.imgur.com/4LCGuAO.png"wind="180" style="border-radius:15px;">
</div>

<h2>🍛 Pedido Online</h2>

<label><b>🍽 Escolha o prato:</b></label>
<select id="prato"></select>

<p style="font-size:13px;">
Acompanha: Arroz, Macarrão, Feijão, Farofa, Banana Frita e Salada
</p>

<label><b>📦 Tamanho:</b></label>
<select id="tamanho" onchange="calcularTotal()">
<option value="">Selecione</option>
<option value="P">Pequeno (P)</option>
<option value="M">Médio (M)</option>
<option value="G">Grande (G)</option>
</select>

<label><b>🚚 Entrega:</b></label>
<select id="entrega" onchange="calcularTotal()">
<option value="0">Retirar no local (Grátis)</option>
<option value="5">Entrega Bairro Próximo (+5)</option>
<option value="8">Entrega Bairro Distante (+8)</option>
</select>

<label><b>💳 Pagamento:</b></label>
<select id="pagamento">
<option>Dinheiro</option>
<option>PIX</option>
<option>Cartão</option>
</select>

<div class="pix-box">
PIX: 69993756085<br>
Nome: Dona Neide
</div>

<div class="total">
Total: <span id="total">R$ 0.00</span>
</div>

<input type="text" id="nome" placeholder="Seu nome">
<input type="text" id="endereco" placeholder="Endereço">

<button onclick="finalizar()">Finalizar Pedido</button>

</div>

<script>

function carregarPratos() {
let hoje = new Date().getDay();
let pratoSelect = document.getElementById("prato");

let cardapio = {
1: ["Bife Acebolado", "Assado de Panela"],
2: ["Frango ao Molho", "Bife Acebolado"],
3: ["Filé de Frango", "Bisteca Bovina"],
4: ["Calabresa Acebolada", "Assado de Panela"],
5: ["Strogonoff de Frango", "Bife Acebolado"],
6: ["Coxinha da Asa Assada", "Toscana Assada"]
};

pratoSelect.innerHTML = '<option value="">Selecione o prato</option>';

if(cardapio[hoje]){
cardapio[hoje].forEach(function(prato){
let option = document.createElement("option");
option.text = prato;
option.value = prato;
pratoSelect.appendChild(option);
});
}else{
pratoSelect.innerHTML = '<option>Fechado hoje</option>';
}
}

function calcularTotal() {
let tamanho = document.getElementById("tamanho").value;
let entrega = parseFloat(document.getElementById("entrega").value);
let total = 0;

if (tamanho === "P") total = 15;
if (tamanho === "M") total = 18;
if (tamanho === "G") total = 22;

total += entrega;

document.getElementById("total").innerText = "R$ " + total.toFixed(2);
}

function finalizar(){

let prato = document.getElementById("prato").value;
let tamanho = document.getElementById("tamanho").value;
let entregaTexto = document.getElementById("entrega").selectedOptions[0].text;
let pagamento = document.getElementById("pagamento").value;
let nome = document.getElementById("nome").value;
let endereco = document.getElementById("endereco").value;
let total = document.getElementById("total").innerText;

if(prato === "" || tamanho === "" || nome === "" || endereco === ""){
alert("Preencha todos os campos!");
return;
}

let mensagem =
"🍛 NOVO PEDIDO - Dona Neide\n\n" +
"🍽 Prato: " + prato + "\n" +
"📦 Tamanho: " + tamanho + "\n" +
"🚚 " + entregaTexto + "\n" +
"💳 Pagamento: " + pagamento + "\n" +
"💰 Total: " + total + "\n\n" +
"👤 Nome: " + nome + "\n" +
"📍 Endereço: " + endereco;

// ENVIA PARA PLANILHA
fetch("https://script.google.com/macros/s/AKfycbx7isZxOmjTSOHiu6cLWTT17TWTn5gc-xdfYH83GMHr-yxTQbTreFFMnfhQRPWbKwB_/exec", {
method: "POST",
mode: "no-cors",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
prato: prato,
tamanho: tamanho,
entrega: entregaTexto,
pagamento: pagamento,
total: total,
nome: nome,
endereco: endereco
})
});

// ENVIA PARA WHATSAPP
let numero = "5569992509281"; // TROQUE PELO SEU WHATSAPP
let url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensagem);

window.open(url, "_blank");

}

carregarPratos();

</script>

</body>
</html>
